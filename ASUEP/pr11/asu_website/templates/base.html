<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureFlow Systems | АСУ Розлива</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">PureFlow<span>Systems</span></div>
            <nav>
                <ul>
                    <li><a href="/" class="{% if request.endpoint == 'home' %}active{% endif %}">О компании</a></li>
                    <li><a href="/tech" class="{% if request.endpoint == 'tech' %}active{% endif %}">Технологии</a></li>
                    <li><a href="/products" class="{% if request.endpoint == 'products' %}active{% endif %}">Продукция</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PureFlow Systems. Автоматизированные системы управления розливом.</p>
            <p class="small">Разработано в рамках курса АСУ ЭПиАО</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
